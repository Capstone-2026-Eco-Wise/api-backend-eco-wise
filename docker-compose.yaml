version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: eco_wise_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    cpus: 0.5
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    networks:
      - eco_wise_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eco_wise_api
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=staging
      - REDIS_URL=redis://redis:6379/0
      - PORT=3000
      - HOST=0.0.0.0
      - AI_API_URL=http://host.docker.internal:8000
    env_file:
      - .env.staging
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - eco_wise_network

volumes:
  redis_data:

networks:
  eco_wise_network:
    driver: bridge
