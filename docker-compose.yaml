version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: eco_wise_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    cpus: 0.5
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru

volumes:
  redis_data:
